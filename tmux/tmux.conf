# use fish
set -g default-command "/usr/bin/fish -l"
set -g default-shell "/usr/bin/fish"

# 24-bit color
set-option -sa terminal-overrides ",xterm*:Tc"

# allow mouse
set -g mouse on

# use alt (meta) as the prefix key
unbind C-b
set -g prefix M-a
bind M-a send-prefix

# vim-style pane navigation with alt + h/j/k/l (no prefix needed)
bind -n M-h select-pane -L
bind -n M-j select-pane -D
bind -n M-k select-pane -U
bind -n M-l select-pane -R

# split panes: alt+| for vertical, alt+- for horizontal (in current path)
bind -n M-Enter split-window -h -c "#{pane_current_path}"
bind -n M-- split-window -v -c "#{pane_current_path}"

# new window with alt+c, open in current path
bind -n M-c new-window -c "#{pane_current_path}"

# switch windows with alt+n / alt+p
bind -n M-n next-window
bind -n M-p previous-window

# switch to window by number with alt+0..9
bind -n M-0 select-window -t 0
bind -n M-1 select-window -t 1
bind -n M-2 select-window -t 2
bind -n M-3 select-window -t 3
bind -n M-4 select-window -t 4
bind -n M-5 select-window -t 5
bind -n M-6 select-window -t 6
bind -n M-7 select-window -t 7
bind -n M-8 select-window -t 8
bind -n M-9 select-window -t 9

# close pane with alt+x
bind -n M-x kill-pane

# resize panes with alt+shift+h/j/k/l
bind -n M-H resize-pane -L 2
bind -n M-J resize-pane -D 2
bind -n M-K resize-pane -U 2
bind -n M-L resize-pane -R 2

# use vim keys in copy mode
setw -g mode-keys vi

# enter copy mode with alt+[ (vim mode for scrolling)
bind -n M-[ copy-mode

# vim-style scrolling in copy mode
bind -T copy-mode-vi C-u send -X halfpage-up
bind -T copy-mode-vi C-d send -X halfpage-down
bind -T copy-mode-vi C-b send -X page-up
bind -T copy-mode-vi C-f send -X page-down

# vim-style selection and yank in copy mode
bind -T copy-mode-vi v send -X begin-selection
bind -T copy-mode-vi y send -X copy-selection-and-cancel
bind -T copy-mode-vi Escape send -X cancel

# start window and pane numbering at 1
set -g base-index 1
setw -g pane-base-index 1
